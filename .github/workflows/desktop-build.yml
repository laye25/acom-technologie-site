name: Build Desktop Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      CSC_SKIP_SIGNING: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Fetch Database Custom Icon
        run: node scripts/fetch-icon.js
        
      - name: Build Web App
        run: npm run build

      - name: Build Electron Desktop App (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --x64 --ia32 --publish never

      - name: Build Electron Desktop App (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never

      - name: Upload Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Acom-Gestion-Desktop-Windows
          path: release/*.exe

      - name: Upload Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Acom-Gestion-Desktop-MacOS
          path: |
            release/*.dmg
            release/*.zip

