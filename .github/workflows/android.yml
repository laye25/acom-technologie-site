name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: |
        # Skip package-lock.json if experiencing issues or conflicts, but standard is npm install
        npm install

    - name: Build Web App
      run: |
        npm run build
        if [ ! -d "dist" ]; then
          echo "Error: dist directory not found after build!"
          exit 1
        fi

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Sync Capacitor project
      run: |
        rm -rf android
        npx cap add android
        npx cap sync android

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Build APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: acom-app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
