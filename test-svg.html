<!DOCTYPE html>
<html>
<body>
<svg id="svg" width="100" height="100">
  <path id="p" d="M 0 0 L 10 0 m 10 0 L 30 0" stroke="black" fill="none"/>
</svg>
<script>
  const p = document.getElementById('p');
  console.log("Total length:", p.getTotalLength());
  console.log("Point at 10:", p.getPointAtLength(10).x, p.getPointAtLength(10).y);
  console.log("Point at 10.0001:", p.getPointAtLength(10.0001).x, p.getPointAtLength(10.0001).y);
  console.log("Point at 10.001:", p.getPointAtLength(10.001).x, p.getPointAtLength(10.001).y);
</script>
</body>
</html>
