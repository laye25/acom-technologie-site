<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio ACOM</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10044/10044161.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Automatically detect if we are in SaaS/Desktop mode
      const isElectron = window && window.process && window.process.type || navigator.userAgent.toLowerCase().includes('electron') || window.location.protocol === 'file:';
      const isSaaSDomain = window.location.hostname.startsWith('saas.') || window.location.search.includes('mode=saas') || isElectron;
      if (isSaaSDomain) {
        document.title = "Acom Gestion Desktop";
      } else {
        document.title = "Acom Studio";
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
