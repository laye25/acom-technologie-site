<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio ACOM</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF0000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10044/10044161.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error handler to catch "page blanche" rendering errors in Desktop execution
      window.addEventListener('error', function(e) {
        if (!document.getElementById('debug-error-box')) {
          const div = document.createElement('div');
          div.id = 'debug-error-box';
          div.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:red;z-index:99999;padding:20px;overflow:auto;font-family:monospace;';
          document.body.appendChild(div);
        }
        document.getElementById('debug-error-box').innerHTML += '<br><hr><br><b>Error:</b> ' + e.message + ' <br><b>At:</b> ' + e.filename + ':' + e.lineno + '<br><pre>' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error("Unhandled Promise Rejection:", e.reason);
      });

      // Automatically detect if we are in SaaS/Desktop mode
      try {
        const isDesktopApp = typeof window !== 'undefined' && (
          ('__TAURI__' in window) || 
          (window.process && window.process.type) || 
          (navigator.userAgent && navigator.userAgent.toLowerCase().includes('electron')) || 
          (window.location && window.location.protocol && !['http:', 'https:'].includes(window.location.protocol))
        );
        const isSaaSDomain = window.location.hostname.startsWith('saas.') || window.location.search.includes('mode=saas') || isDesktopApp;
        if (isSaaSDomain) {
          document.title = "Acom Gestion Desktop";
        } else {
          document.title = "Acom Studio";
        }
      } catch (e) {
        console.error("Error in theme detection:", e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
